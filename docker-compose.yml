version: "3.8"

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend1:
    build: ./backend
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  backend2:
    build: ./backend
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    volumes:
      - ./backend:/app

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend1
      - backend2
